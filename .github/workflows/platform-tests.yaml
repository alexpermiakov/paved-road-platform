# Tests for the platform's OWN logic — the things every app team inherits:
#   1. the golden-path Helm chart (rollout strategy, the canary-needs-ingress
#      guard, the enforced pod security context, the default-deny network policy)
#   2. the Kyverno admission-control policies (disallow :latest, drop ALL caps,
#      trusted registries only, required resource limits)
# These gate changes so a platform regression — a broken chart OR a guardrail
# that silently stops denying — can't ship to every app team.

name: Platform Tests

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read # making sure we override repo/org defaults :)

jobs:
  chart-tests:
    name: Helm chart lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.1.4

      - name: Install helm-unittest plugin
        # Helm 4 requires --verify=false for unsigned plugin sources; the current
        # helm-unittest manifest (platformHooks) only loads on Helm 4, not 3.x.
        run: helm plugin install --verify=false https://github.com/helm-unittest/helm-unittest

      - name: Lint chart (with representative values)
        run: |
          helm lint helm-charts/standard-service \
            --set app.name=test-svc \
            --set app.image=idp/test-svc:v1.0.0 \
            --set platform.ecrRegistry=1234.dkr.ecr.us-west-2.amazonaws.com \
            --set ingress.enabled=true \
            --set ingress.wafEnabled=false

      - name: Run chart unit tests
        run: helm unittest --strict helm-charts/standard-service

  policy-tests:
    name: Kyverno policy unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Kyverno CLI
        uses: kyverno/action-install-cli@v0.2.0
        with:
          release: v1.18.1

      - name: Run policy unit tests
        # Catches a regression that silently weakens a policy so it no longer denies.
        run: kyverno test infra/modules/security/kyverno-policies/tests

