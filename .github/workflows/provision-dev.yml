name: Provision Dev

on:
  pull_request:
  workflow_dispatch:

# One provision run per PR at a time. Without this, a new push starts a second run
# that races the first on the same Terraform state — which can orphan a cluster and
# surface as "ResourceInUseException: Cluster already exists".
concurrency:
  group: provision-dev-${{ github.event.number || github.ref }}
  cancel-in-progress: false

env:
  BUCKET_NAME: terraform-state-alexidp-dev
  TF_VAR_pr_number: ${{ github.event.number }}
  TF_VAR_environment: dev

jobs:
  # Cheap, fast guardrails that run BEFORE spending time and money provisioning a
  # real EKS cluster: unit-test the golden-path chart + Kyverno policies, and scan
  # the IaC for misconfiguration. If either fails, the provision job is skipped.
  chart-tests:
    uses: ./.github/workflows/platform-tests.yaml

  iac-scan:
    uses: ./.github/workflows/security-scan.yml

  terraform-static:
    uses: ./.github/workflows/terraform-static.yaml

  secrets-scan:
    uses: ./.github/workflows/secrets-scan.yaml
    # The reusable workflow requests these for GitLeaks (SARIF upload + PR
    # comment); a caller must grant at least what the callee declares, and the
    # repo default is read-only, so grant them explicitly here.
    permissions:
      contents: read
      security-events: write # GitLeaks uploads its findings as SARIF to the code-scanning tab
      pull-requests: write # GitLeaks posts the leak summary as a PR comment

  provision:
    name: Provision PR Cluster (${{ matrix.region }})
    needs: [chart-tests, iac-scan, terraform-static, secrets-scan]
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    # Expose the ALB URL so the post-deploy smoke job can target it.
    # (Single active region in the matrix, so this resolves to one value.)
    outputs:
      alb_url: ${{ steps.alb.outputs.url }}

    strategy:
      fail-fast: false
      matrix:
        region:
          - us-west-2
          # - us-east-1

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ matrix.region }}
          audience: sts.amazonaws.com
          role-duration-seconds: 7200

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.3
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infra/entry
        run: |
          terraform init \
            -backend-config="region=us-west-2" \
            -backend-config="bucket=${{ env.BUCKET_NAME }}" \
            -backend-config="key=pr-${{ github.event.number }}/${{ matrix.region }}/state.tfstate"

      - name: Terraform Apply - VPC First
        working-directory: infra/entry
        run: |
          terraform apply -auto-approve \
            -var-file=regions/${{ matrix.region }}.tfvars \
            -target=module.vpc \
            -var='admin_role_arns=${{ vars.ADMIN_ROLE_ARNS }}' \
            -var="target_branch=${{ github.head_ref || github.ref_name }}" \
            -var="ecr_account_id=${{ vars.ECR_ACCOUNT_ID }}"

      - name: Refresh AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ matrix.region }}
          audience: sts.amazonaws.com
          role-duration-seconds: 7200

      - name: Terraform Apply - Full
        id: tf_apply_full
        working-directory: infra/entry
        env:
          TF_VAR_github_app_id: ${{ secrets.ARGOCD_GITHUB_APP_ID }}
          TF_VAR_github_app_installation_id: ${{ secrets.ARGOCD_GITHUB_APP_INSTALLATION_ID }}
          TF_VAR_github_app_private_key: ${{ secrets.ARGOCD_GITHUB_APP_PRIVATE_KEY }}
        run: |
          terraform apply -auto-approve \
            -var-file=regions/${{ matrix.region }}.tfvars \
            -var='admin_role_arns=${{ vars.ADMIN_ROLE_ARNS }}' \
            -var="target_branch=${{ github.head_ref || github.ref_name }}" \
            -var="ecr_account_id=${{ vars.ECR_ACCOUNT_ID }}"

      - name: Get Cluster Credentials
        working-directory: infra/entry
        run: |
          CLUSTER_NAME=$(terraform output -raw cluster_name)
          aws eks update-kubeconfig --name "$CLUSTER_NAME" --region ${{ matrix.region }}

      - name: Wait for ALB and Get URL
        id: alb
        run: |
          echo "Waiting for ALB to be provisioned..."
          for i in {1..30}; do
            ALB_URL=$(kubectl get ingress -A -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
            if [ -n "$ALB_URL" ]; then
              echo "url=http://$ALB_URL" >> $GITHUB_OUTPUT
              echo "ALB URL: http://$ALB_URL"
              exit 0
            fi
            echo "Attempt $i/30: ALB not ready, waiting 10s..."
            sleep 10
          done
          echo "url=pending" >> $GITHUB_OUTPUT
          echo "ALB not ready after 5 minutes"

      - name: Comment PR with Cluster Info
        if: github.event_name == 'pull_request' && matrix.region == 'us-west-2'
        uses: actions/github-script@v7
        with:
          script: |
            const albUrl = '${{ steps.alb.outputs.url }}';
            const region = '${{ matrix.region }}';

            const body = `## 🚀 Dev Cluster Deployed (${region})

            | Resource | URL |
            |----------|-----|
            | **ALB Endpoint** | ${albUrl} |
            | **Order Service** | ${albUrl}/orders |
            | **LLM Client** | ${albUrl}/ask |

            `;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('🚀 Dev Cluster Deployed')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

  smoke:
    name: Smoke (post-deploy)
    needs: provision
    if: needs.provision.outputs.alb_url != '' && needs.provision.outputs.alb_url != 'pending'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install smoke dependencies
        working-directory: tests
        run: npm ci

      - name: Run smoke tests
        working-directory: tests
        env:
          SMOKE_BASE_URL: ${{ needs.provision.outputs.alb_url }}
        run: npx playwright test

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: tests/playwright-report
          retention-days: 7

