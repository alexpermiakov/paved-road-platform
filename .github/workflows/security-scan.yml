# Hard gate on IaC misconfiguration. exit-code 1 means a NEW HIGH/CRITICAL
# finding fails the build. Pre-existing, triaged findings are suppressed (with
# rationale) in the repo-root .trivyignore — the "baseline then gate" pattern.

name: Security Scan

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy-iac:
    name: Trivy IaC Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy IaC scanner (Terraform)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "config"
          scan-ref: "infra/"
          format: "table"
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          trivyignores: ".trivyignore"
          # Intentionally-insecure pod fixtures for `kyverno test` — false positives here.
          skip-dirs: "infra/modules/security/kyverno-policies/tests"

      - name: Run Trivy IaC scanner (Helm Charts)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "config"
          scan-ref: "helm-charts/"
          format: "table"
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          trivyignores: ".trivyignore"

      - name: Run Trivy IaC scanner (ArgoCD/K8s manifests)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "config"
          scan-ref: "argocd/"
          format: "table"
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          trivyignores: ".trivyignore"

  # Deeper scanner with built-in compliance mappings (PCI/HIPAA/SOC2); soft_fail by
  # design — a broad signal for what Trivy doesn't cover, not the gate (Trivy is).
  checkov:
    name: Checkov Policy Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          framework: terraform
          output_format: cli
          soft_fail: true # Set to false after reviewing initial findings
          # Skipped checks:
          # CKV_AWS_144: Cross-region replication not needed for this setup
          # CKV_TF_1: Commit hash N/A for local modules
          # CKV_AWS_130: Public subnets intentional for internet-facing ALB
          # CKV_AWS_260: Port 80 ingress intentional for HTTP→HTTPS redirect
          # CKV_AWS_382: Egress 0.0.0.0/0 needed for EKS nodes to reach AWS APIs
          # CKV2_AWS_57: Secrets rotation requires Lambda (future enhancement)
          skip_check: CKV_AWS_144,CKV_TF_1,CKV_AWS_130,CKV_AWS_260,CKV_AWS_382,CKV2_AWS_57

